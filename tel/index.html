<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resize" />
  <meta name="theme-color" content="#1a1510" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>전화 예약 접수 · 초원농원</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="/display/icon-192.png" />
  <link rel="stylesheet" href="tel.css?v=8" />
</head>
<body>
  <div class="tel-root">
    <header class="tel-header">
      <h1>전화 예약 접수</h1>
    </header>

    <main class="tel-main">
      <!-- 왼쪽: 달력 -->
      <section class="tel-col tel-cal">
        <div class="panel">
          <div class="panel-head">
            <button type="button" class="nav-btn" id="month-prev">&lt;</button>
            <div class="month-label" id="month-label"></div>
            <button type="button" class="nav-btn" id="month-next">&gt;</button>
          </div>
          <div class="weekdays">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </section>

      <!-- 가운데: 선택 날짜 예약 현황 (지금은 더미 텍스트만) -->
      <section class="tel-col tel-list">
        <div class="panel">
          <div class="panel-head">
            <div class="selected-date" id="selected-date-label">날짜를 선택하세요</div>
          </div>
          <div class="filters">
            <button type="button" class="chip chip-on" data-filter="all">전체</button>
            <button type="button" class="chip" data-filter="lunch">점심 12~14</button>
            <button type="button" class="chip" data-filter="dinner">저녁 17~19</button>
          </div>
          <div class="reserve-list" id="reserve-list">
            <div class="empty">왼쪽 달력에서 날짜를 고르면 이곳에 예약이 표시됩니다.</div>
          </div>
        </div>
      </section>

      <!-- 오른쪽: 예약 접수 폼 -->
      <section class="tel-col tel-form">
        <div class="panel">
          <div class="panel-head">
            <div class="form-date" id="form-date-label">예약 일자를 먼저 선택하세요</div>
          </div>
          <form id="tel-form" autocomplete="off">
            <div class="field">
              <label for="tel-phone">전화번호</label>
              <input type="tel" id="tel-phone" inputmode="tel" placeholder="010-0000-0000" autocomplete="off" />
            </div>
            <div class="field">
              <label for="tel-name">이름</label>
              <input type="text" id="tel-name" placeholder="고객명" autocomplete="off" />
            </div>

            <div class="field">
              <label>예약 시간</label>
              <input type="text" id="tel-time" placeholder="12:00" maxlength="5" readonly autocomplete="off" />
              <div class="time-quick">
                <div class="time-tabs">
                  <button type="button" class="time-tab active" data-slot="lunch">점심 12:00~14:00</button>
                  <button type="button" class="time-tab" data-slot="dinner">저녁 17:00~19:00</button>
                </div>
                <div class="time-buttons" id="time-buttons-lunch">
                  <button type="button" class="time-btn" data-time="12:00">12:00</button>
                  <button type="button" class="time-btn" data-time="12:30">12:30</button>
                  <button type="button" class="time-btn" data-time="13:00">13:00</button>
                  <button type="button" class="time-btn" data-time="13:30">13:30</button>
                  <button type="button" class="time-btn" data-time="14:00">14:00</button>
                </div>
                <div class="time-buttons hidden" id="time-buttons-dinner">
                  <button type="button" class="time-btn" data-time="17:00">17:00</button>
                  <button type="button" class="time-btn" data-time="17:30">17:30</button>
                  <button type="button" class="time-btn" data-time="18:00">18:00</button>
                  <button type="button" class="time-btn" data-time="18:30">18:30</button>
                  <button type="button" class="time-btn" data-time="19:00">19:00</button>
                </div>
              </div>
            </div>

            <div class="field count-row">
              <label>인원</label>
              <div class="count-grid">
                <div class="field inline">
                  <label class="count-label">어른</label>
                  <div class="counter">
                    <button type="button" class="step" data-delta="-1" data-target="tel-count-adult">-</button>
                    <input type="text" id="tel-count-adult" value="2" inputmode="numeric" autocomplete="off" />
                    <button type="button" class="step" data-delta="1" data-target="tel-count-adult">+</button>
                  </div>
                </div>
                <div class="field inline">
                  <label class="count-label">어린이</label>
                  <div class="counter">
                    <button type="button" class="step" data-delta="-1" data-target="tel-count-child">-</button>
                    <input type="text" id="tel-count-child" value="0" inputmode="numeric" autocomplete="off" />
                    <button type="button" class="step" data-delta="1" data-target="tel-count-child">+</button>
                  </div>
                </div>
                <div class="field inline">
                  <label class="count-label">유아</label>
                  <div class="counter">
                    <button type="button" class="step" data-delta="-1" data-target="tel-count-infant">-</button>
                    <input type="text" id="tel-count-infant" value="0" inputmode="numeric" autocomplete="off" />
                    <button type="button" class="step" data-delta="1" data-target="tel-count-infant">+</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="field">
              <label for="tel-room">룸 / 테이블</label>
              <div class="room-picker">
                <input type="text" id="tel-room" placeholder="선택 버튼으로 호실/테이블 선택" autocomplete="off" readonly />
                <button type="button" class="picker-btn" id="tel-room-open">선택</button>
              </div>
            </div>

            <button type="submit" class="submit-btn">예약등록</button>
          </form>
        </div>
      </section>
    </main>

    <div class="toast" id="tel-toast" aria-live="polite"></div>
  </div>

  <div class="room-dialog hidden" id="room-dialog" aria-hidden="true">
    <div class="room-dialog-backdrop" id="room-dialog-backdrop"></div>
    <div class="room-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="room-dialog-title">
      <div class="room-dialog-head">
        <div>
          <h2 id="room-dialog-title">룸 / 테이블 선택</h2>
          <p class="room-dialog-meta" id="room-dialog-meta">날짜와 시간을 먼저 선택하세요.</p>
        </div>
        <button type="button" class="room-dialog-close" id="room-dialog-close">닫기</button>
      </div>
      <div class="room-dialog-legend">
        <span class="legend available">선택 가능</span>
        <span class="legend reserved">예약 완료</span>
        <span class="legend selected">현재 선택</span>
      </div>
      <div class="room-group-tabs" id="room-group-tabs"></div>
      <div class="room-grid" id="room-grid"></div>
    </div>
  </div>

  <script src="tel.js?v=8"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/tel/sw.js', { scope: '/tel/' }).catch(function () {});
    }
  </script>
</body>
</html>
