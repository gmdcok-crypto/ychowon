<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1510" />
  <meta name="description" content="초원농원 예약 현황판" />
  <title>초원농원 예약 현황</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1510'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='%23c9a962' font-family='sans-serif'>예</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="board">
    <!-- 상단 브랜딩 -->
    <header class="header">
      <div class="logo-wrap">
        <span class="logo-sub">RESERVATION</span>
        <h1 class="logo">초원농원</h1>
        <span class="logo-sub">예약 현황</span>
      </div>
      <div class="datetime" aria-live="polite">
        <span class="date"></span>
        <span class="time"></span>
      </div>
    </header>

    <!-- 예약 목록: 15줄 단위 블록, 초과 시 옆에 블록 추가 -->
    <div class="blocks" id="reservation-blocks">
      <!-- JS에서 .block (시간|이름|호실 헤더 + 15행) 단위로 생성 -->
    </div>

    <!-- 하단 광고: 관리자「현황판 하단」탭에서 URL·스케줄 설정 (app.js가 API로 채움) -->
    <section class="ad-area" aria-label="광고">
      <div class="ad-media" id="ad-media"></div>
    </section>

    <!-- 하단 디코 -->
    <footer class="footer">
      <span class="footer-text">Premium Farm Dining</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
