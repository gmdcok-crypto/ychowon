<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1510" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>예약 입력 · 국제식품 초원농원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=14" />
</head>
<body>
  <div class="admin admin-with-tabs">
    <header class="admin-header">
      <h1>국제식품 초원농원</h1>
    </header>

    <div class="admin-tab-bar" role="tablist" aria-label="예약 종류">
      <button type="button" class="admin-tab active" data-tab="staff" role="tab" id="tab-btn-staff" aria-controls="panel-staff" aria-selected="true">당일예약 및 현황</button>
      <button type="button" class="admin-tab" data-tab="tel" role="tab" id="tab-btn-tel" aria-controls="panel-tel" aria-selected="false">전화 예약</button>
      <button type="button" class="admin-tab" data-tab="all" role="tab" id="tab-btn-all" aria-controls="panel-all" aria-selected="false">예약조회</button>
      <button type="button" class="admin-tab" data-tab="display" role="tab" id="tab-btn-display" aria-controls="panel-display" aria-selected="false">컨텐츠관리</button>
      <button type="button" class="admin-tab" data-tab="accounts" role="tab" id="tab-btn-accounts" aria-controls="panel-accounts" aria-selected="false">계정 관리</button>
    </div>

    <section class="main-section admin-tab-panel" id="panel-staff" role="tabpanel" aria-labelledby="tab-btn-staff">
      <div class="form-block">
        <div class="form-block-head">
          <h2 id="form-title">예약 추가</h2>
          <span id="staff-kst-clock" class="staff-kst-clock" aria-live="polite"></span>
        </div>
        <form id="add-form" class="add-form">
          <div class="field field-time">
            <label for="time">시간</label>
            <div class="staff-time-field-row">
              <input
                type="text"
                id="time"
                name="time"
                class="input-time-24"
                placeholder="탭하여 선택"
                maxlength="5"
                title="탭하면 시간 슬롯을 고를 수 있습니다"
                autocomplete="off"
                spellcheck="false"
                readonly
                required
              />
            </div>
          </div>
          <div class="add-form-name-room">
            <div class="field field-name">
              <label for="name">이름</label>
              <input type="text" id="name" name="name" placeholder="홍길동" required />
            </div>
            <div class="field field-room">
              <label for="room">호실</label>
              <input
                type="text"
                id="room"
                name="room"
                placeholder="탭하여 선택"
                title="탭하면 룸·테이블을 고를 수 있습니다"
                required
                readonly
                autocomplete="off"
              />
            </div>
            <div class="field field-party">
              <label for="party-display">인원</label>
              <input
                type="text"
                id="party-display"
                name="party_display"
                placeholder="탭하여 선택"
                title="탭하면 어른·어린이·유아 인원을 고를 수 있습니다"
                readonly
                autocomplete="off"
              />
            </div>
            <div class="form-actions form-actions-inline">
              <button type="submit" class="btn btn-add" id="submit-btn">추가</button>
              <button type="button" class="btn btn-cancel" id="cancel-edit-btn" style="display:none;">취소</button>
            </div>
          </div>
          <div class="form-actions form-actions-refresh">
            <button type="button" class="btn btn-refresh" id="btn-refresh-list" title="서버에서 목록 다시 불오기">목록 새로고침</button>
          </div>
        </form>
      </div>
      <div class="list-block">
        <div class="reservation-table">
          <div class="list-table-header" role="row" aria-label="예약 목록 열 제목">
            <span class="list-h-col list-h-no">No</span>
            <span class="list-h-col list-h-time">예약시간</span>
            <span class="list-h-col list-h-name">예약자</span>
            <span class="list-h-col list-h-room">예약실</span>
            <span class="list-h-col list-h-party">인원</span>
            <span class="list-h-actions" aria-hidden="true"></span>
          </div>
          <div id="list" class="reservation-list"></div>
        </div>
      </div>
    </section>

    <div class="admin-tab-panel admin-tab-panel-tel hidden" id="panel-tel" role="tabpanel" aria-labelledby="tab-btn-tel">
      <div class="admin-tel-frame">
        <iframe id="iframe-tel-admin" class="admin-tel-iframe" title="전화 예약 접수" src="/tel/"></iframe>
      </div>
    </div>

    <div class="admin-tab-panel admin-tab-panel-all hidden" id="panel-all" role="tabpanel" aria-labelledby="tab-btn-all">
      <div class="admin-tel-frame admin-all-frame">
        <iframe id="iframe-all-admin" class="admin-tel-iframe" title="예약조회" src="/admin/all.html?embed=1"></iframe>
      </div>
    </div>

    <div class="admin-tab-panel admin-tab-panel-display hidden" id="panel-display" role="tabpanel" aria-labelledby="tab-btn-display">
      <div class="admin-tel-frame admin-all-frame">
        <iframe id="iframe-display-admin" class="admin-tel-iframe" title="컨텐츠관리" src="/admin/display-content.html?embed=1"></iframe>
      </div>
    </div>

    <section class="admin-tab-panel admin-tab-panel-accounts hidden" id="panel-accounts" role="tabpanel" aria-labelledby="tab-btn-accounts">
      <div class="accounts-panel">
        <p class="accounts-hint">비밀번호는 서버에 해시(bcrypt)로만 저장됩니다. 인증 취소 시 해당 계정은 비밀번호를 다시 설정해야 로그인할 수 있습니다.</p>
        <div class="accounts-toolbar">
          <button type="button" class="btn btn-add" id="accounts-btn-add">추가</button>
          <button type="button" class="btn btn-edit" id="accounts-btn-edit">수정</button>
          <button type="button" class="btn btn-del" id="accounts-btn-delete">삭제</button>
          <button type="button" class="btn btn-cancel" id="accounts-btn-revoke">인증 취소</button>
        </div>
        <div class="accounts-table-wrap">
          <table class="accounts-table">
            <thead>
              <tr>
                <th scope="col">No</th>
                <th scope="col">계정이름</th>
                <th scope="col">인증</th>
              </tr>
            </thead>
            <tbody id="accounts-table-body"></tbody>
          </table>
        </div>
        <div id="accounts-toast" class="accounts-toast" aria-live="polite"></div>
      </div>
    </section>

    <div class="accounts-modal hidden" id="accounts-modal" aria-hidden="true">
      <div class="accounts-modal-backdrop" id="accounts-modal-backdrop"></div>
      <div class="accounts-modal-panel" role="dialog" aria-labelledby="accounts-modal-title">
        <h2 id="accounts-modal-title">계정</h2>
        <div class="accounts-modal-fields" id="accounts-modal-fields"></div>
        <div class="accounts-modal-actions">
          <button type="button" class="btn btn-cancel" id="accounts-modal-cancel">취소</button>
          <button type="button" class="btn btn-add" id="accounts-modal-save">저장</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <!-- fixed 모달: .admin 밖(body 직계)으로 두어 레이어·터치 이슈 방지 -->
  <div class="room-dialog staff-time-dialog hidden" id="staff-time-dialog" aria-hidden="true">
    <div class="room-dialog-backdrop" id="staff-time-dialog-backdrop"></div>
    <div class="room-dialog-panel staff-time-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="staff-time-dialog-title">
      <div class="room-dialog-head">
        <div>
          <h2 id="staff-time-dialog-title">예약 시간 선택</h2>
          <p class="room-dialog-meta">전화예약과 동일한 점심·저녁 슬롯입니다.</p>
        </div>
        <button type="button" class="room-dialog-close" id="staff-time-dialog-close">닫기</button>
      </div>
      <div class="staff-time-quick">
        <div class="staff-time-tabs">
          <button type="button" class="staff-time-tab active" data-slot="lunch">점심 12:00~14:00</button>
          <button type="button" class="staff-time-tab" data-slot="dinner">저녁 17:00~19:00</button>
        </div>
        <div class="staff-time-buttons" id="staff-time-buttons-lunch">
          <button type="button" class="staff-time-btn" data-time="12:00">12:00</button>
          <button type="button" class="staff-time-btn" data-time="12:30">12:30</button>
          <button type="button" class="staff-time-btn" data-time="13:00">13:00</button>
          <button type="button" class="staff-time-btn" data-time="13:30">13:30</button>
          <button type="button" class="staff-time-btn" data-time="14:00">14:00</button>
        </div>
        <div class="staff-time-buttons hidden" id="staff-time-buttons-dinner">
          <button type="button" class="staff-time-btn" data-time="17:00">17:00</button>
          <button type="button" class="staff-time-btn" data-time="17:30">17:30</button>
          <button type="button" class="staff-time-btn" data-time="18:00">18:00</button>
          <button type="button" class="staff-time-btn" data-time="18:30">18:30</button>
          <button type="button" class="staff-time-btn" data-time="19:00">19:00</button>
        </div>
      </div>
    </div>
  </div>

  <div class="room-dialog staff-party-dialog hidden" id="staff-party-dialog" aria-hidden="true">
    <div class="room-dialog-backdrop" id="staff-party-dialog-backdrop"></div>
    <div class="room-dialog-panel staff-party-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="staff-party-dialog-title">
      <div class="room-dialog-head">
        <div>
          <h2 id="staff-party-dialog-title">인원</h2>
          <p class="room-dialog-meta">전화 예약 화면과 동일하게 어른·어린이·유아를 선택합니다.</p>
        </div>
        <button type="button" class="room-dialog-close" id="staff-party-dialog-close">닫기</button>
      </div>
      <div class="field count-row staff-party-count">
        <label>인원</label>
        <div class="count-grid">
          <div class="field inline">
            <label class="count-label" for="staff-count-adult">어른</label>
            <div class="counter">
              <button type="button" class="step" data-delta="-1" data-target="staff-count-adult">-</button>
              <input type="text" id="staff-count-adult" value="2" inputmode="numeric" autocomplete="off" />
              <button type="button" class="step" data-delta="1" data-target="staff-count-adult">+</button>
            </div>
          </div>
          <div class="field inline">
            <label class="count-label" for="staff-count-child">어린이</label>
            <div class="counter">
              <button type="button" class="step" data-delta="-1" data-target="staff-count-child">-</button>
              <input type="text" id="staff-count-child" value="0" inputmode="numeric" autocomplete="off" />
              <button type="button" class="step" data-delta="1" data-target="staff-count-child">+</button>
            </div>
          </div>
          <div class="field inline">
            <label class="count-label" for="staff-count-infant">유아</label>
            <div class="counter">
              <button type="button" class="step" data-delta="-1" data-target="staff-count-infant">-</button>
              <input type="text" id="staff-count-infant" value="0" inputmode="numeric" autocomplete="off" />
              <button type="button" class="step" data-delta="1" data-target="staff-count-infant">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="room-dialog hidden" id="staff-room-dialog" aria-hidden="true">
    <div class="room-dialog-backdrop" id="staff-room-dialog-backdrop"></div>
    <div class="room-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="staff-room-dialog-title">
      <div class="room-dialog-head">
        <div>
          <h2 id="staff-room-dialog-title">룸 / 테이블 선택</h2>
          <p class="room-dialog-meta" id="staff-room-dialog-meta">시간을 먼저 입력하세요.</p>
        </div>
        <button type="button" class="room-dialog-close" id="staff-room-dialog-close">닫기</button>
      </div>
      <div class="room-dialog-legend">
        <span class="legend available">선택 가능</span>
        <span class="legend reserved">예약 완료</span>
        <span class="legend selected">현재 선택</span>
      </div>
      <div class="room-group-tabs" id="staff-room-group-tabs"></div>
      <div class="room-grid" id="staff-room-grid"></div>
    </div>
  </div>

  <script src="/api/branch-boot.js"></script>
  <script src="admin.js?v=12"></script>
  <script src="accounts.js"></script>
</body>
</html>
